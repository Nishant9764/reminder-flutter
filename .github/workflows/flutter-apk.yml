# ╔══════════════════════════════════════════════════════════════════════╗
# ║  .github/workflows/build_apk.yml                                     ║
# ║  Builds a signed release APK on every push to main / on manual       ║
# ║  trigger, and attaches it to a GitHub Release automatically.          ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ── Required GitHub Secrets ───────────────────────────────────────────────────
#   KEYSTORE_BASE64   →  base64-encoded JKS keystore file
#                        Generate: keytool -genkey -v -keystore lumina.jks \
#                          -keyalg RSA -keysize 2048 -validity 10000 \
#                          -alias lumina
#                        Encode:   base64 -i lumina.jks | pbcopy   (macOS)
#                                  base64 lumina.jks               (Linux)
#
#   KEY_ALIAS         →  The alias used above (e.g.  lumina)
#   KEY_PASSWORD      →  Password for the key alias
#   STORE_PASSWORD    →  Password for the keystore file
#
# How to add secrets:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # trigger on version tags like v1.0.0

  workflow_dispatch:  # manual trigger from GitHub Actions UI
    inputs:
      release_notes:
        description: 'What changed in this build?'
        required: false
        default:  'New build'

# ── Concurrency: cancel any in-progress run for the same branch ───────────────
concurrency:
  group:              ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name:    Build Signed APK
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout source code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 ── Set up Java 17 (required by Android Gradle Plugin 8+) ────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache:        gradle

      # 3 ── Set up Flutter (stable channel) ──────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel:         stable
          cache:           true

      # 4 ── Print versions for debugging ─────────────────────────────────────
      - name: Flutter & Dart versions
        run: |
          flutter --version
          dart   --version

      # ── Patch android/settings.gradle.kts ────────────────────────────────
      # AGP 9.0.1 requires Gradle 9.1.0+, but Flutter 3.29.2's Kotlin Gradle
      # plugin uses APIs removed in Gradle 9 (fileMode, String.toLowerCase).
      # Downgrading AGP → 8.7.0 and Kotlin → 2.1.0 lets us stay on Gradle
      # 8.11.1 where everything is compatible. Changes are runner-only.
      - name: Patch settings.gradle.kts (AGP 8.7.0 + Kotlin 2.1.0)
        run: |
          SFILE="android/settings.gradle.kts"
          sed -i 's|id("com.android.application") version "[^"]*"|id("com.android.application") version "8.7.0"|g' "$SFILE"
          sed -i 's|id("org.jetbrains.kotlin.android") version "[^"]*"|id("org.jetbrains.kotlin.android") version "2.1.0"|g' "$SFILE"
          echo "Patched $SFILE:"
          grep 'com.android.application\|kotlin.android' "$SFILE"

      # ── Pin Gradle wrapper to 8.11.1 ─────────────────────────────────────
      # AGP 8.7.0 minimum is Gradle 8.9. 8.11.1 is the latest stable 8.x
      # release — stays below Gradle 9 where Flutter's plugin breaks.
      - name: Patch gradle-wrapper.properties (Gradle 8.11.1)
        run: |
          WFILE="android/gradle/wrapper/gradle-wrapper.properties"
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip|' "$WFILE"
          echo "Gradle wrapper:"
          cat "$WFILE"

      # ── Upgrade flutter_timezone ──────────────────────────────────────────
      # flutter_timezone 1.0.8 uses PluginRegistry.Registrar (Flutter v1
      # embedding API) which was fully removed. v3+ uses the current v2 API.
      # Patching pubspec.yaml on the runner; your local file is untouched.
      - name: Upgrade flutter_timezone to v3
        run: |
          sed -i 's/flutter_timezone:.*$/flutter_timezone: ^3.0.0/' pubspec.yaml
          echo "flutter_timezone line after patch:"
          grep flutter_timezone pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      # 7 ── Run static analysis ──────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true   # don't fail the build on deprecation warnings

      # 8 ── Decode keystore from secret ──────────────────────────────────────
      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # ── Validate the secret is present ───────────────────────────────
          if [ -z "$KS_B64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty or not set."
            echo "To fix:"
            echo "  macOS:  base64 -i lumina.jks | pbcopy   → paste into secret"
            echo "  Linux:  base64 -w 0 lumina.jks           → copy into secret"
            exit 1
          fi

          # ── Decode (strip whitespace first for safety) ────────────────────
          printf '%s' "$KS_B64" | tr -d '[:space:]' | base64 --decode > android/app/lumina.jks

          # ── Validate output is non-empty ──────────────────────────────────
          BYTES=$(wc -c < android/app/lumina.jks)
          if [ "$BYTES" -eq 0 ]; then
            echo "::error::Keystore decoded to 0 bytes — base64 string is malformed."
            exit 1
          fi
          echo "Keystore decoded successfully: $BYTES bytes"

          # ── Show keystore type so we can confirm it is readable ───────────
          file android/app/lumina.jks || true

      # Convert keystore to legacy PKCS12 so AGP can read it.
      # Java 17 writes PKCS12 with AES-256+PBKDF2 by default; the Android
      # signing tools only understand the old 3DES PKCS12 ("Tag > 30" error).
      # -J-Dkeystore.pkcs12.legacy rewrites with 3DES / SHA-1 MAC.
      - name: Convert keystore to legacy PKCS12 (AGP-compatible)
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
        run: |
          keytool -importkeystore \
            -srckeystore   android/app/lumina.jks \
            -srcstorepass  "$STORE_PASS" \
            -destkeystore  android/app/lumina_compat.jks \
            -deststoretype PKCS12 \
            -deststorepass "$STORE_PASS" \
            -noprompt \
            -J-Dkeystore.pkcs12.legacy 2>&1
          mv android/app/lumina_compat.jks android/app/lumina.jks
          echo "Converted — size: $(wc -c < android/app/lumina.jks) bytes"

      # 9 ── Write key.properties (read by android/app/build.gradle) ──────────
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=lumina.jks
          EOF
          echo "key.properties written"

      # 10 ── Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --split-per-abi
        # --split-per-abi produces 3 smaller APKs (arm32, arm64, x86_64)
        # instead of one fat APK. Remove the flag for a single universal APK.

      # 11 ── List build outputs (useful for debugging path issues) ──────────
      - name: List APK outputs
        run: find build/app/outputs/flutter-apk -name "*.apk" -type f

      # 12 ── Upload APK as workflow artifact (always available) ─────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name:             lumina-apk-${{ github.sha }}
          path:             build/app/outputs/flutter-apk/*.apk
          retention-days:   30

      # 13 ── Compute release tag & name ─────────────────────────────────────
      # FIX: Moved ternary logic into a shell step to avoid YAML comment-char
      #      (#) and unclosed-expression errors in inline ${{ }} expressions.
      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag_name=${{ github.ref_name }}"             >> $GITHUB_OUTPUT
            echo "release_name=Lumina ${{ github.ref_name }}"  >> $GITHUB_OUTPUT
          else
            echo "tag_name=build-${{ github.run_number }}"                >> $GITHUB_OUTPUT
            echo "release_name=Lumina Build ${{ github.run_number }}"     >> $GITHUB_OUTPUT
          fi

      # 14 ── Create GitHub Release (only on version tags or main branch) ─────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name:     ${{ steps.meta.outputs.release_name }}
          body: |
            ## Lumina Reminders — Automated Build

            **Commit:** `${{ github.sha }}`
            **Branch:**  ${{ github.ref_name }}
            **Built at:** ${{ github.event.head_commit.timestamp }}

            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            ---
            ### APK Downloads
            | File | Architecture |
            |------|-------------|
            | `app-arm64-v8a-release.apk`  | 64-bit ARM  (most modern phones) |
            | `app-armeabi-v7a-release.apk`| 32-bit ARM  (older phones)       |
            | `app-x86_64-release.apk`     | 64-bit x86  (emulators)          |

            > **Install tip:** Download the `arm64-v8a` APK for any phone made after 2017.
          files: build/app/outputs/flutter-apk/*.apk
          draft:      false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # Optional: run Flutter unit tests before building
  test:
    name:    Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel:         stable
          cache:           true


      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: |
          if [ -d "test" ] && [ -n "$(find test -name '*_test.dart' 2>/dev/null)" ]; then
            flutter test --reporter compact
          else
            echo "No test files found — skipping."
          fi
        continue-on-error: true
