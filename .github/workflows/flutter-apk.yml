# .github/workflows/build_apk.yml
#
# Required secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64  → base64 -w 0 lumina.jks        (Linux)
#                      base64 -i lumina.jks | tr -d '\n'  (macOS)
#   STORE_PASSWORD   → keystore password
#   KEY_ALIAS        → key alias (e.g. lumina)
#   KEY_PASSWORD     → key password
#
# If secrets are not set the build still succeeds with a debug-signed APK.

name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false
        default: 'New build'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      # flutter_timezone 1.x uses removed Flutter v1 embedding API (Registrar).
      - name: Upgrade flutter_timezone to v3
        run: |
          sed -i 's/flutter_timezone:.*$/flutter_timezone: ^3.0.0/' pubspec.yaml
          grep flutter_timezone pubspec.yaml

      # Force JVM 17 for both Java and Kotlin across all plugin subprojects.
      # Previous approach used hasProperty("android") which doesn't match
      # flutter_timezone — it left JavaCompile at 11 while KotlinCompile
      # was 17 → "Inconsistent JVM-target compatibility" error.
      # Fix: target JavaCompile and KotlinCompile tasks directly.
      - name: Align JVM targets for all subprojects
        run: |
          cat >> android/build.gradle << 'GROOVY'

          // Appended by CI: force JVM 17 for Java + Kotlin in all plugin subprojects.
          subprojects {
              afterEvaluate {
                  tasks.withType(JavaCompile).configureEach {
                      sourceCompatibility = JavaVersion.VERSION_17
                      targetCompatibility = JavaVersion.VERSION_17
                  }
                  tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                      kotlinOptions { jvmTarget = "17" }
                  }
              }
          }
          GROOVY
          echo "JVM alignment block appended to android/build.gradle"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # Skips entirely if KEYSTORE_BASE64 secret is not set.
      # build.gradle.kts falls back to the debug keystore automatically.
      - name: Setup release signing
        env:
          KS_B64:     ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "No keystore secret found — build will use debug signing."
            exit 0
          fi

          echo "$KS_B64" | base64 --decode > android/app/lumina.jks
          BYTES=$(wc -c < android/app/lumina.jks)
          echo "Decoded: $BYTES bytes"

          if [ "$BYTES" -eq 0 ]; then
            echo "Keystore decoded to 0 bytes — check KEYSTORE_BASE64 secret value."
            exit 1
          fi

          # Java 17 writes PKCS12 with AES-256; AGP signing tools need legacy 3DES.
          keytool -importkeystore \
            -srckeystore   android/app/lumina.jks \
            -srcstorepass  "$STORE_PASS" \
            -destkeystore  android/app/lumina_compat.jks \
            -deststoretype PKCS12 \
            -deststorepass "$STORE_PASS" \
            -noprompt \
            -J-Dkeystore.pkcs12.legacy 2>&1
          mv android/app/lumina_compat.jks android/app/lumina.jks
          echo "Converted to legacy PKCS12: $(wc -c < android/app/lumina.jks) bytes"

          printf 'storeFile=lumina.jks\n'           >  android/key.properties
          printf 'storePassword=%s\n' "$STORE_PASS" >> android/key.properties
          printf 'keyAlias=%s\n'      "$KEY_ALIAS"  >> android/key.properties
          printf 'keyPassword=%s\n'   "$KEY_PASS"   >> android/key.properties
          echo "key.properties written."

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: List APKs
        run: find build/app/outputs/flutter-apk -name "*.apk" | sort

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}"            >> "$GITHUB_OUTPUT"
            echo "title=Release ${{ github.ref_name }}"  >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                       >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${{ github.run_number }}"         >> "$GITHUB_OUTPUT"
            echo "title=Build ${{ github.run_number }}"       >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                            >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.title }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body: |
            **Commit:** `${{ github.sha }}`
            **Branch:** ${{ github.ref_name }}
            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            | APK | Architecture |
            |-----|-------------|
            | `app-arm64-v8a-release.apk` | 64-bit ARM — most phones after 2017 |
            | `app-armeabi-v7a-release.apk` | 32-bit ARM — older phones |
            | `app-x86_64-release.apk` | x86_64 — emulators |
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run tests
        run: |
          if find test -name '*_test.dart' 2>/dev/null | grep -q .; then
            flutter test --reporter compact
          else
            echo "No test files — skipping."
          fi
        continue-on-error: true
