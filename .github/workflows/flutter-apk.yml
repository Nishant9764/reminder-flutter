# ╔══════════════════════════════════════════════════════════════════════╗
# ║  .github/workflows/build_apk.yml                                     ║
# ║  Builds a signed release APK on every push to main / manual trigger  ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   KEYSTORE_BASE64  →  base64 of your .jks file
#   KEY_ALIAS        →  alias used when creating the keystore  (e.g. lumina)
#   KEY_PASSWORD     →  alias password
#   STORE_PASSWORD   →  keystore password

name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false
        default:  'New build'

concurrency:
  group:              ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════════
  build:
    name:    Build Signed APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────
      #   Required by Android Gradle Plugin 8+ and our jvmToolchain(17).
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache:        gradle

      # ── 3. Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel:         stable
          cache:           true

      # ── 4. Version info ──────────────────────────────────────────────
      - name: Print versions
        run: |
          flutter --version
          dart    --version
          java    -version

      # ── 5. Groovy 4.x / Gradle 9+ compatibility patch ────────────────
      #   Flutter's flutter.groovy uses groovy.xml.QName (deleted in
      #   Groovy 4) and groovy.util.* classes (moved to groovy.xml.*).
      #   This one-shot Python patch fixes all known breakage points.
      #   Safe no-op if the file is not found or already patched.
      - name: Patch flutter.groovy for Groovy 4.x / Gradle 9+
        run: |
          GROOVY_FILE=$(find "$FLUTTER_ROOT" -name "flutter.groovy" 2>/dev/null | head -1)
          if [ -z "$GROOVY_FILE" ]; then
            echo "flutter.groovy not found — skipping patch (probably already fixed in this Flutter release)"
            exit 0
          fi
          echo "Patching: $GROOVY_FILE"
          python3 << PYEOF
import sys, re

path = "$GROOVY_FILE"
with open(path) as fh:
    src = fh.read()

original = src

# ── Fix 1: groovy.xml.QName was deleted in Groovy 4; use JDK standard ──
src = src.replace(
    'import groovy.xml.QName',
    'import javax.xml.namespace.QName'
)

# ── Fix 2: groovy.util.* moved to groovy.xml.* in Groovy 4 ─────────────
#   These classes are no longer auto-imported; add explicit imports.
needs = [
    'import groovy.xml.XmlParser',
    'import groovy.xml.XmlSlurper',
    'import groovy.xml.MarkupBuilder',
]
lines = src.splitlines()
last_import = max(
    (i for i, l in enumerate(lines) if l.startswith('import ')),
    default=0
)
inserted = 0
for imp in reversed(needs):
    if imp not in src:
        lines.insert(last_import + 1, imp)
        inserted += 1

src = '\n'.join(lines)
with open(path, 'w') as fh:
    fh.write(src)

if src != original:
    print(f"Patched {inserted + (1 if 'javax.xml' in src else 0)} item(s) in {path}")
else:
    print("No changes needed — file already compatible with Groovy 4.x")
PYEOF

      # ── 6. Install pub packages ──────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get

      # ── 7. Decode keystore ───────────────────────────────────────────
      #   The secret is the raw base64 of your .jks file.
      #   Written to android/app/lumina.jks — matches storeFile in
      #   key.properties and the file() path in build.gradle.kts.
      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/lumina.jks
          echo "Keystore size: $(wc -c < android/app/lumina.jks) bytes"

      # ── 8. Write key.properties ──────────────────────────────────────
      #   Written to android/key.properties (one level above app/).
      #   rootProject.file("key.properties") in build.gradle.kts
      #   resolves to this exact path.
      #   Uses printf to write each line individually — avoids any
      #   whitespace / heredoc indentation ambiguity.
      - name: Write key.properties
        run: |
          printf 'storeFile=lumina.jks\n'                             > android/key.properties
          printf 'storePassword=%s\n' "${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          printf 'keyAlias=%s\n'      "${{ secrets.KEY_ALIAS }}"      >> android/key.properties
          printf 'keyPassword=%s\n'   "${{ secrets.KEY_PASSWORD }}"   >> android/key.properties
          echo "key.properties contents (passwords masked):"
          sed 's/=.*/=***/' android/key.properties

      # ── 9. Build release APK ─────────────────────────────────────────
      #   --split-per-abi → 3 lean APKs instead of one fat universal.
      #   Remove the flag if you want a single universal APK.
      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      # ── 10. List outputs ─────────────────────────────────────────────
      - name: List APKs
        run: find build/app/outputs/flutter-apk -name "*.apk" | sort

      # ── 11. Upload artifact ──────────────────────────────────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name:           lumina-apk-${{ github.run_number }}
          path:           build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # ── 12. Compute tag / release name ───────────────────────────────
      #   Shell step avoids inline ternary expressions in ${{ }} which
      #   break YAML parsing when they contain '#' or unbalanced braces.
      - name: Set release metadata
        id:   meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}"                        >> "$GITHUB_OUTPUT"
            echo "title=Lumina ${{ github.ref_name }}"               >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                                   >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${{ github.run_number }}"                >> "$GITHUB_OUTPUT"
            echo "title=Lumina — Build #${{ github.run_number }}"    >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                                    >> "$GITHUB_OUTPUT"
          fi

      # ── 13. Create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          github.ref == 'refs/heads/main'        ||
          github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.title }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body: |
            ## Lumina Reminders

            **Commit:** `${{ github.sha }}`
            **Branch:** ${{ github.ref_name }}
            **Build:**  #${{ github.run_number }}

            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            ---
            | APK file | Device |
            |---|---|
            | `app-arm64-v8a-release.apk`   | 64-bit ARM — all phones after 2017 ✅ |
            | `app-armeabi-v7a-release.apk` | 32-bit ARM — older phones |
            | `app-x86_64-release.apk`      | x86_64 — emulators only |
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════
  test:
    name:    Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel:         stable
          cache:           true
      - run: flutter pub get
      - name: Run tests
        run: |
          if find test -name '*_test.dart' 2>/dev/null | grep -q .; then
            flutter test --reporter compact
          else
            echo "No test files found — skipping."
          fi
        continue-on-error: true
