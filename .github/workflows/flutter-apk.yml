# ╔══════════════════════════════════════════════════════════════════════╗
# ║  .github/workflows/build_apk.yml                                     ║
# ║  Builds a signed release APK on every push to main / on manual       ║
# ║  trigger, and attaches it to a GitHub Release automatically.          ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ── Required GitHub Secrets ───────────────────────────────────────────────────
#   KEYSTORE_BASE64   →  base64-encoded JKS keystore file
#                        Generate: keytool -genkey -v -keystore lumina.jks \
#                          -keyalg RSA -keysize 2048 -validity 10000 \
#                          -alias lumina
#                        Encode:   base64 -i lumina.jks | pbcopy   (macOS)
#                                  base64 lumina.jks               (Linux)
#
#   KEY_ALIAS         →  The alias used above (e.g.  lumina)
#   KEY_PASSWORD      →  Password for the key alias
#   STORE_PASSWORD    →  Password for the keystore file
#
# How to add secrets:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # trigger on version tags like v1.0.0

  workflow_dispatch:  # manual trigger from GitHub Actions UI
    inputs:
      release_notes:
        description: 'What changed in this build?'
        required: false
        default:  'New build'

# ── Concurrency: cancel any in-progress run for the same branch ───────────────
concurrency:
  group:              ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name:    Build Signed APK
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout source code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 ── Set up Java 17 (required by Android Gradle Plugin 8+) ────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache:        gradle

      # 3 ── Set up Flutter (stable channel) ──────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel:         stable
          cache:           true

      # 4 ── Print versions for debugging ─────────────────────────────────────
      - name: Flutter & Dart versions
        run: |
          flutter --version
          dart   --version

      # 5 ── Patch flutter.groovy for full Groovy 4.x / Gradle 9+ compatibility ─
      # ROOT CAUSE: AGP in this project requires Gradle 9.1.0+ → Groovy 4.x.
      #   Flutter 3.27.4's flutter.groovy was written for Groovy 3.x and has
      #   three categories of breakage in Groovy 4:
      #   (a) groovy.xml.QName was deleted → replaced by javax.xml.namespace.QName
      #   (b) XmlParser / XmlSlurper / MarkupBuilder moved from groovy.util.*
      #       (auto-imported in Groovy 3) to groovy.xml.* (not auto-imported)
      #   Fixing them one at a time re-compiles and surfaces the next error.
      #   This step patches all known breakage points in a single Python pass.
      - name: Patch flutter.groovy (full Groovy 4.x compatibility)
        run: |
          FLUTTER_GROOVY=$(find "$FLUTTER_ROOT" -name "flutter.groovy" 2>/dev/null | head -1)
          if [ -n "$FLUTTER_GROOVY" ]; then
            python3 - "$FLUTTER_GROOVY" <<'PYEOF'
import sys

path = sys.argv[1]
with open(path) as f:
    src = f.read()

# Fix (a): groovy.xml.QName removed in Groovy 4 — use the Java standard class
src = src.replace('import groovy.xml.QName', 'import javax.xml.namespace.QName')

# Fix (b): XmlParser / XmlSlurper / MarkupBuilder are in groovy.xml.* in
# Groovy 4 but that package is NOT auto-imported, so add explicit imports.
to_add = [
    'import groovy.xml.XmlParser',
    'import groovy.xml.XmlSlurper',
    'import groovy.xml.MarkupBuilder',
]
lines = src.splitlines()
last_import = max(
    (i for i, l in enumerate(lines) if l.startswith('import ')), default=0
)
for imp in reversed(to_add):
    if imp not in src:
        lines.insert(last_import + 1, imp)
src = '\n'.join(lines)

with open(path, 'w') as f:
    f.write(src)

print('Patched:', path)
print('--- resulting imports ---')
for l in src.splitlines():
    if l.startswith('import '):
        print(l)
PYEOF
          else
            echo "flutter.groovy not found — may already be fixed in this Flutter version"
          fi

      # 6 ── Install pub dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # 7 ── Run static analysis ──────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true   # don't fail the build on deprecation warnings

      # 8 ── Decode keystore from secret ──────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/lumina.jks
          echo "Keystore written to android/app/lumina.jks"

      # 9 ── Write key.properties (read by android/app/build.gradle) ──────────
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=lumina.jks
          EOF
          echo "key.properties written"

      # 10 ── Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --split-per-abi
        # --split-per-abi produces 3 smaller APKs (arm32, arm64, x86_64)
        # instead of one fat APK. Remove the flag for a single universal APK.

      # 11 ── List build outputs (useful for debugging path issues) ──────────
      - name: List APK outputs
        run: find build/app/outputs/flutter-apk -name "*.apk" -type f

      # 12 ── Upload APK as workflow artifact (always available) ─────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name:             lumina-apk-${{ github.sha }}
          path:             build/app/outputs/flutter-apk/*.apk
          retention-days:   30

      # 13 ── Compute release tag & name ─────────────────────────────────────
      # FIX: Moved ternary logic into a shell step to avoid YAML comment-char
      #      (#) and unclosed-expression errors in inline ${{ }} expressions.
      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag_name=${{ github.ref_name }}"             >> $GITHUB_OUTPUT
            echo "release_name=Lumina ${{ github.ref_name }}"  >> $GITHUB_OUTPUT
          else
            echo "tag_name=build-${{ github.run_number }}"                >> $GITHUB_OUTPUT
            echo "release_name=Lumina Build ${{ github.run_number }}"     >> $GITHUB_OUTPUT
          fi

      # 14 ── Create GitHub Release (only on version tags or main branch) ─────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name:     ${{ steps.meta.outputs.release_name }}
          body: |
            ## Lumina Reminders — Automated Build

            **Commit:** `${{ github.sha }}`
            **Branch:**  ${{ github.ref_name }}
            **Built at:** ${{ github.event.head_commit.timestamp }}

            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            ---
            ### APK Downloads
            | File | Architecture |
            |------|-------------|
            | `app-arm64-v8a-release.apk`  | 64-bit ARM  (most modern phones) |
            | `app-armeabi-v7a-release.apk`| 32-bit ARM  (older phones)       |
            | `app-x86_64-release.apk`     | 64-bit x86  (emulators)          |

            > **Install tip:** Download the `arm64-v8a` APK for any phone made after 2017.
          files: build/app/outputs/flutter-apk/*.apk
          draft:      false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # Optional: run Flutter unit tests before building
  test:
    name:    Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel:         stable
          cache:           true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: |
          if [ -d "test" ] && [ -n "$(find test -name '*_test.dart' 2>/dev/null)" ]; then
            flutter test --reporter compact
          else
            echo "No test files found — skipping."
          fi
        continue-on-error: true
