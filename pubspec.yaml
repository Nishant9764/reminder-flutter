name: lumina_reminders
description: A cinematic, dark-mode reminder application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local notifications (scheduled + immediate)
  flutter_local_notifications: ^17.2.1

  # Timezone support for scheduled notifications
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0   # upgraded from 1.0.8 — v1 used removed Flutter v1 embedding API

  # Persistent key-value storage
  shared_preferences: ^2.3.2

  # UUID generation
  uuid: ^4.5.1

  # Typography
  google_fonts: ^6.2.1

  # Date/time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
